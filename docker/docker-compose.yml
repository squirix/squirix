services:
  node-a:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    container_name: squirix-node-a
    environment:
      - SQUIRIX_API_KEYS=dev-docker-key
      - SQUIRIX_ADMIN_ENABLED=true
    ports:
      - "5001:5000" # HTTPS gRPC + /health + /metrics + /admin
    volumes:
      - ./node-a/Squirix.settings.json:/app/Squirix.settings.json:ro
      - nodea-data:/data
    networks:
      - squirix-net

  node-b:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    container_name: squirix-node-b
    environment:
      - SQUIRIX_API_KEYS=dev-docker-key
      - SQUIRIX_ADMIN_ENABLED=true
    ports:
      - "5002:5000"
    volumes:
      - ./node-b/Squirix.settings.json:/app/Squirix.settings.json:ro
      - nodeb-data:/data
    networks:
      - squirix-net

volumes:
  nodea-data: {}
  nodeb-data: {}

networks:
  squirix-net:
    driver: bridge
