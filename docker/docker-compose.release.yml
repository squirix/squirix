# Release-image compose for LOCAL verification of packed squirix-server tool images.
# Secrets are NOT baked in — set them explicitly (copy .env.example to .env for local dev only).
# Do not deploy unchanged to production. See docs/containerization.md#security.

services:
  node-a:
    build:
      context: ..
      dockerfile: docker/Dockerfile.release
      args:
        SQUIRIX_VERSION: 0.1.0-preview.4
        LOCAL_PACKAGES: "true"
    container_name: squirix-node-a-release
    environment:
      - SQUIRIX_JWT_SIGNING_KEY=${SQUIRIX_JWT_SIGNING_KEY:?Set SQUIRIX_JWT_SIGNING_KEY — see docker/.env.example}
      - SQUIRIX_JWT_ISSUER=${SQUIRIX_JWT_ISSUER:?Set SQUIRIX_JWT_ISSUER — see docker/.env.example}
      - SQUIRIX_JWT_AUDIENCE=${SQUIRIX_JWT_AUDIENCE:?Set SQUIRIX_JWT_AUDIENCE — see docker/.env.example}
      - SQUIRIX_CLUSTER_MTLS_CA_PATH=/mtls/cluster-ca.crt
      - SQUIRIX_CLUSTER_MTLS_CERT_PFX_PATH=/mtls/node-A.pfx
      - SQUIRIX_CLUSTER_MTLS_CERT_PFX_PASSWORD=${SQUIRIX_CLUSTER_MTLS_CERT_PFX_PASSWORD:?Set SQUIRIX_CLUSTER_MTLS_CERT_PFX_PASSWORD — see docker/.env.example}
      - SQUIRIX_CLUSTER_MTLS_INTERNAL_PORT=5100
    command: ["run", "--persist", "--data-dir", "/data"]
    ports:
      - "5001:5000"
    volumes:
      - ./node-a/Squirix.settings.json:/app/Squirix.settings.json:ro
      - nodea-data:/data
    networks:
      - squirix-net

  node-b:
    build:
      context: ..
      dockerfile: docker/Dockerfile.release
      args:
        SQUIRIX_VERSION: 0.1.0-preview.4
        LOCAL_PACKAGES: "true"
    container_name: squirix-node-b-release
    environment:
      - SQUIRIX_JWT_SIGNING_KEY=${SQUIRIX_JWT_SIGNING_KEY:?Set SQUIRIX_JWT_SIGNING_KEY — see docker/.env.example}
      - SQUIRIX_JWT_ISSUER=${SQUIRIX_JWT_ISSUER:?Set SQUIRIX_JWT_ISSUER — see docker/.env.example}
      - SQUIRIX_JWT_AUDIENCE=${SQUIRIX_JWT_AUDIENCE:?Set SQUIRIX_JWT_AUDIENCE — see docker/.env.example}
      - SQUIRIX_CLUSTER_MTLS_CA_PATH=/mtls/cluster-ca.crt
      - SQUIRIX_CLUSTER_MTLS_CERT_PFX_PATH=/mtls/node-B.pfx
      - SQUIRIX_CLUSTER_MTLS_CERT_PFX_PASSWORD=${SQUIRIX_CLUSTER_MTLS_CERT_PFX_PASSWORD:?Set SQUIRIX_CLUSTER_MTLS_CERT_PFX_PASSWORD — see docker/.env.example}
      - SQUIRIX_CLUSTER_MTLS_INTERNAL_PORT=5100
    command: ["run", "--persist", "--data-dir", "/data"]
    ports:
      - "5002:5000"
    volumes:
      - ./node-b/Squirix.settings.json:/app/Squirix.settings.json:ro
      - nodeb-data:/data
    networks:
      - squirix-net

volumes:
  nodea-data: {}
  nodeb-data: {}

networks:
  squirix-net:
    driver: bridge
