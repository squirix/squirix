services:
  node-a:
    build:
      context: ..
      dockerfile: Dockerfile.release
      args:
        SQUIRIX_VERSION: 0.1.0-preview.4
        LOCAL_PACKAGES: "true"
    container_name: squirix-node-a-release
    environment:
      - SQUIRIX_HTTP1_PORT=5001
      - SQUIRIX_HTTP1_ALLOW_INSECURE_EXTERNAL=true
      - SQUIRIX_ALLOW_UNAUTHENTICATED_EXTERNAL=true
    ports:
      - "5001:5001"
    volumes:
      - ./node-a/Squirix.settings.json:/app/Squirix.settings.json:ro
      - nodea-data:/data
    networks:
      - squirix-net

  node-b:
    build:
      context: ..
      dockerfile: Dockerfile.release
      args:
        SQUIRIX_VERSION: 0.1.0-preview.4
        LOCAL_PACKAGES: "true"
    container_name: squirix-node-b-release
    environment:
      - SQUIRIX_HTTP1_PORT=5001
      - SQUIRIX_HTTP1_ALLOW_INSECURE_EXTERNAL=true
      - SQUIRIX_ALLOW_UNAUTHENTICATED_EXTERNAL=true
    ports:
      - "5002:5001"
    volumes:
      - ./node-b/Squirix.settings.json:/app/Squirix.settings.json:ro
      - nodeb-data:/data
    networks:
      - squirix-net

volumes:
  nodea-data: {}
  nodeb-data: {}

networks:
  squirix-net:
    driver: bridge
