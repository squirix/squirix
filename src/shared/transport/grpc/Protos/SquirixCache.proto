syntax = "proto3";

package squirix.cache;

option csharp_namespace = "Squirix.Transport.Grpc.Cache";

import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

message Entry {
  google.protobuf.Struct value = 1;
  google.protobuf.Timestamp expires_utc = 2;
  google.protobuf.Duration expiration = 3;
}

message CacheValue {
  oneof kind {
    google.protobuf.NullValue null_value = 1;
    string string_value = 2;
    int64 int64_value = 3;
    double double_value = 4;
    bool bool_value = 5;
    google.protobuf.Struct struct_value = 6;
  }
}

message InsertRequest {
  string cache_name = 1;
  string key = 2;
  Entry entry = 3;
}

message InsertResponse {}

message InsertValueRequest {
  string cache_name = 1;
  string key = 2;
  CacheValue value = 3;
  google.protobuf.Timestamp expires_utc = 4;
  google.protobuf.Duration expiration = 5;
}

message GetRequest {
  string cache_name = 1;
  string key = 2;
}

message GetResponse {
  Entry entry = 1;
}

message GetValueRequest {
  string cache_name = 1;
  string key = 2;
}

message GetValueResponse {
  bool found = 1;
  CacheValue value = 2;
}

message RemoveRequest {
  string cache_name = 1;
  string key = 2;
}

message RemoveResponse {
  bool removed = 1;
  google.protobuf.Struct previous_value = 2;
}

message ContainsRequest {
  string cache_name = 1;
  string key = 2;
}

message ContainsResponse {
  bool exists = 1;
}

message TryInsertRequest {
  string cache_name = 1;
  string key = 2;
  Entry entry = 3;
}

message TryInsertResponse {
  bool inserted = 1;
}

message TryInsertValueRequest {
  string cache_name = 1;
  string key = 2;
  CacheValue value = 3;
  google.protobuf.Timestamp expires_utc = 4;
  google.protobuf.Duration expiration = 5;
}

message TouchRequest {
  string cache_name = 1;
  string key = 2;
  google.protobuf.Duration expiration = 3;
}

message TouchResponse {
  bool found = 1;
}

message RemoveExpirationRequest {
  string cache_name = 1;
  string key = 2;
}

message RemoveExpirationResponse {
  bool found = 1;
}

service SquirixCacheService {
  rpc Insert(InsertRequest) returns (InsertResponse);
  rpc InsertValue(InsertValueRequest) returns (InsertResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc GetValue(GetValueRequest) returns (GetValueResponse);
  rpc Remove(RemoveRequest) returns (RemoveResponse);
  rpc Contains(ContainsRequest) returns (ContainsResponse);
  rpc TryInsert(TryInsertRequest) returns (TryInsertResponse);
  rpc TryInsertValue(TryInsertValueRequest) returns (TryInsertResponse);
  rpc Touch(TouchRequest) returns (TouchResponse);
  rpc RemoveExpiration(RemoveExpirationRequest) returns (RemoveExpirationResponse);
}
