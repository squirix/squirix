name: squirix CodeQL configuration

disable-default-queries: false

queries:
  - uses: security-and-quality

# With build-mode: none (see codeql.yml), paths-ignore is honored for C#.
# Excludes generated/build output from extraction and code scanning alerts.
paths-ignore:
  - '**/*.g.cs'
  - '**/obj/**'
  - '**/bin/**'

query-filters:
  - exclude:
      id: cs/linq/missed-where
  - exclude:
      id: cs/linq/missed-select
